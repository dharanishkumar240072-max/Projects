version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: system_monitor_db
    environment:
      MYSQL_ROOT_PASSWORD: Dharanish@2505
      MYSQL_DATABASE: system_monitor
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: system_monitor_web
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=Dharanish@2505
      - DB_NAME=system_monitor
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
